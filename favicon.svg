<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rotor countdown-ring mark. Transparent background so both light and
       dark browser chrome work. 75% arc = "45s elapsed of 60s" feel. -->
  <circle cx="32" cy="32" r="24"
          fill="none"
          stroke="#7cc4ff"
          stroke-width="8"
          stroke-linecap="round"
          pathLength="100"
          stroke-dasharray="75 100"
          transform="rotate(-90 32 32)"/>
</svg>
