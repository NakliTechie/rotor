<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 700" width="390" height="700">
  <!-- Background (dimmed vault) -->
  <rect width="390" height="700" fill="#15100c"/>

  <!-- Topbar (dimmed) -->
  <rect width="390" height="52" fill="#15100c" opacity="0.35"/>
  <text x="20" y="34" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="18" letter-spacing="1" fill="#c8512a" opacity="0.35">ROTOR</text>

  <!-- Modal dim overlay -->
  <rect width="390" height="700" fill="rgba(0,0,0,0.55)"/>

  <!-- Modal sheet -->
  <rect x="0" y="140" width="390" height="560" rx="16" fill="#1e1813" stroke="#2e241b" stroke-width="1"/>

  <!-- Modal title -->
  <text x="24" y="180" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="700" font-size="20" fill="#f5e6c8">New code</text>

  <!-- otpauth URI field -->
  <text x="24" y="212" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">otpauth:// URI (optional — auto-fills fields)</text>
  <rect x="24" y="220" width="342" height="38" rx="8" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="38" y="244" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#8a7a5a">otpauth://totp/GitHub:chirag@github.com?secret=…</text>

  <!-- Label field -->
  <text x="24" y="284" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Label *</text>
  <rect x="24" y="292" width="342" height="38" rx="8" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="38" y="316" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#f5e6c8">GitHub</text>

  <!-- Secret field -->
  <text x="24" y="354" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Secret (Base32)</text>
  <rect x="24" y="362" width="342" height="38" rx="8" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="38" y="386" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#8a7a5a" letter-spacing="2">••••••••••••••••</text>
  <text x="350" y="386" text-anchor="end" font-size="16" fill="#8a7a5a">👁</text>

  <!-- Account + Issuer row -->
  <text x="24" y="426" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Account</text>
  <text x="200" y="426" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Issuer</text>
  <rect x="24" y="434" width="164" height="34" rx="7" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="36" y="456" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f5e6c8">chirag@github.com</text>
  <rect x="202" y="434" width="164" height="34" rx="7" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="214" y="456" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#f5e6c8">GitHub</text>

  <!-- Algorithm / Digits / Period -->
  <text x="24" y="490" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Algorithm</text>
  <text x="144" y="490" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Digits</text>
  <text x="260" y="490" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Period</text>
  <rect x="24" y="498" width="106" height="32" rx="7" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="77" y="519" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#f5e6c8">SHA-1</text>
  <rect x="142" y="498" width="106" height="32" rx="7" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="195" y="519" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#f5e6c8">6</text>
  <rect x="260" y="498" width="106" height="32" rx="7" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="313" y="519" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#f5e6c8">30s</text>

  <!-- Footer buttons -->
  <rect x="252" y="560" width="70" height="36" rx="8" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="287" y="584" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#8a7a5a">Cancel</text>
  <rect x="334" y="560" width="58" height="36" rx="8" fill="#c8512a"/>
  <text x="363" y="584" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="700" font-size="13" fill="#15100c">Save</text>
</svg>
