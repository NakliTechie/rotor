<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 700" width="390" height="700">
  <rect width="390" height="700" fill="#15100c"/>

  <!-- Content box -->
  <rect x="20" y="40" width="350" height="620" rx="14" fill="#1e1813" stroke="#2e241b" stroke-width="1"/>

  <!-- Back link -->
  <text x="40" y="80" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#8a7a5a">← Back</text>

  <!-- Title -->
  <text x="40" y="114" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="700" font-size="22" fill="#f5e6c8">Create vault</text>
  <!-- Folder chip -->
  <rect x="208" y="98" width="90" height="22" rx="5" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="253" y="114" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#8a7a5a">my-codes</text>

  <!-- Subtitle -->
  <text x="40" y="140" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Choose a master password. There is no recovery.</text>

  <!-- Warning box -->
  <rect x="40" y="156" width="310" height="52" rx="8" fill="rgba(212,169,74,0.1)" stroke="rgba(212,169,74,0.35)" stroke-width="1"/>
  <text x="56" y="177" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="700" font-size="12" fill="#d4a94a">No recovery.</text>
  <text x="56" y="195" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#d4a94a">Forget the master password and your codes are gone.</text>

  <!-- Device name label + field -->
  <text x="40" y="234" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Device name</text>
  <rect x="40" y="242" width="310" height="40" rx="8" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="56" y="268" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#f5e6c8">Chirag's MacBook</text>

  <!-- Master password label + field -->
  <text x="40" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Master password</text>
  <rect x="40" y="316" width="310" height="40" rx="8" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="56" y="342" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" fill="#f5e6c8" letter-spacing="3">••••••••••••••••</text>
  <text x="334" y="342" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#8a7a5a">👁</text>

  <!-- Entropy bar -->
  <rect x="40" y="362" width="310" height="4" rx="2" fill="#2e241b"/>
  <rect x="40" y="362" width="240" height="4" rx="2" fill="#7a9a3a"/>
  <text x="40" y="380" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#7a9a3a">~104 bits — strong</text>

  <!-- Confirm password -->
  <text x="40" y="410" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Confirm password</text>
  <rect x="40" y="418" width="310" height="40" rx="8" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="56" y="444" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" fill="#f5e6c8" letter-spacing="3">••••••••••••••••</text>

  <!-- Create button -->
  <rect x="210" y="484" width="140" height="44" rx="9" fill="#c8512a"/>
  <text x="280" y="512" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="700" font-size="15" fill="#15100c">Create vault</text>
</svg>
