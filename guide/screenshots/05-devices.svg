<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 700" width="390" height="700">
  <rect width="390" height="700" fill="#15100c"/>

  <!-- Topbar -->
  <line x1="0" y1="52" x2="390" y2="52" stroke="#2e241b" stroke-width="1"/>
  <text x="20" y="34" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="18" letter-spacing="1" fill="#c8512a">ROTOR</text>
  <rect x="104" y="18" width="82" height="20" rx="5" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="145" y="32" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#8a7a5a">my-codes</text>

  <!-- Modal background -->
  <rect x="0" y="52" width="390" height="648" fill="rgba(0,0,0,0.55)"/>

  <!-- Settings modal -->
  <rect x="20" y="80" width="350" height="560" rx="14" fill="#1e1813" stroke="#2e241b" stroke-width="1"/>

  <!-- Modal title -->
  <text x="40" y="116" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="700" font-size="20" fill="#f5e6c8">Settings</text>

  <!-- Settings tabs -->
  <line x1="40" y1="152" x2="350" y2="152" stroke="#2e241b" stroke-width="1"/>
  <text x="52" y="144" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#8a7a5a">Vault</text>
  <!-- Devices ACTIVE -->
  <text x="120" y="144" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#c8512a">Devices</text>
  <line x1="118" y1="152" x2="168" y2="152" stroke="#c8512a" stroke-width="2"/>
  <text x="200" y="144" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#8a7a5a">Security</text>
  <text x="278" y="144" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#8a7a5a">Data</text>

  <!-- Subtitle -->
  <text x="40" y="180" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Each device that has written to this vault. Revoking invalidates future events.</text>

  <!-- Device 1: this device -->
  <rect x="40" y="196" width="310" height="68" rx="10" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="58" y="222" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="14" fill="#f5e6c8">Chirag's MacBook</text>
  <!-- THIS DEVICE badge -->
  <rect x="218" y="210" width="82" height="18" rx="4" fill="#c8512a"/>
  <text x="259" y="223" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="700" font-size="10" fill="#15100c">this device</text>
  <text x="58" y="244" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#8a7a5a">a3f9c12b… · 2026-04-24</text>

  <!-- Device 2: iPhone -->
  <rect x="40" y="276" width="310" height="68" rx="10" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="58" y="302" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="14" fill="#f5e6c8">iPhone 15 Pro</text>
  <text x="58" y="324" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#8a7a5a">b8d041ea… · 2026-04-23</text>
  <rect x="288" y="286" width="52" height="28" rx="7" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="314" y="305" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#8a7a5a">Revoke</text>

  <!-- Device 3: Old iPad (revoked, faded) -->
  <rect x="40" y="356" width="310" height="68" rx="10" fill="#221a13" stroke="#2e241b" stroke-width="1" opacity="0.45" stroke-dasharray="4,3"/>
  <text x="58" y="382" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="14" fill="#8a7a5a" opacity="0.6">Old iPad</text>
  <text x="58" y="404" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#8a7a5a" opacity="0.5">revoked · 2026-04-22</text>

  <!-- Close button -->
  <rect x="270" y="564" width="80" height="38" rx="8" fill="#221a13" stroke="#2e241b" stroke-width="1"/>
  <text x="310" y="588" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#8a7a5a">Close</text>
</svg>
